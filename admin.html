<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Movies - Admin Panel</title>
    <link rel="stylesheet" href="script.css">
</head>
<body>
    <header>
        <h1>PR <span style="color: #1e90ff;">&#9658;</span> Movies - Admin Panel</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="support.html">Support</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="login-section">
            <h2>Enter Secret Code</h2>
            <input type="password" id="secret-code" placeholder="Enter secret code">
            <button id="login-button">Login</button>
            <p id="login-message"></p>
        </section>

        <section id="upload-section" style="display: none;">
            <h2>Upload Your Video</h2>
            <input type="file" id="video-upload" accept="video/*">
            <p id="upload-message"></p>
        </section>

        <section id="video-upload-section" style="display: none;">
            <h2>Upload a Video</h2>
            <form id="video-upload-form">
                <label for="video-title">Video Title:</label>
                <input type="text" id="video-title" placeholder="Enter video title" required>

                <label for="video-file">Select Video:</label>
                <input type="file" id="video-file" accept="video/*" required>

                <button type="submit">Upload Video</button>
            </form>

            <p id="video-upload-status"></p>
        </section>

        <section id="movie-upload-section" style="display: none;">
            <h2>Upload Movie</h2>
            <form id="movie-upload-form">
                <label for="movie-title">Title:</label>
                <input type="text" id="movie-title" placeholder="Enter movie title" required>

                <label for="movie-description">Description:</label>
                <textarea id="movie-description" placeholder="Enter movie description" required></textarea>

                <label for="movie-release-date">Release Date:</label>
                <input type="date" id="movie-release-date" required>

                <label for="movie-image">Movie Image:</label>
                <input type="file" id="movie-image" accept="image/*" required>

                <label for="movie-video">Movie Video:</label>
                <input type="file" id="movie-video" accept="video/*" required>

                <button type="submit">Upload Movie</button>
            </form>

            <p id="upload-status"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Admin Panel</p>
    </footer>

    <script src="admin.js"></script>
</body>
</html>
